<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Planner</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="tailwind.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Manrope', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #e0e3e5;
            border-radius: 10px;
        }
    </style>
</head>
<body class="bg-surface text-on-surface w-[360px] flex flex-col h-[600px] overflow-hidden">

    <header class="sticky top-0 w-full z-50 bg-[#f7f9fb]/85 backdrop-blur-md shadow-sm shadow-slate-200/50 flex flex-col px-4 py-3">
        <div class="flex items-center justify-between w-full">
            <div class="flex items-center gap-2">
                <span class="material-symbols-outlined text-[#0f172a]">analytics</span>
                <h1 class="font-manrope font-bold text-lg tracking-tight text-[#0f172a]">Planner</h1>
            </div>
            <div class="flex gap-2">
                <button id="openInWindowBtn" title="Open in Window" class="w-8 h-8 hidden items-center justify-center rounded-xl hover:bg-[#f2f4f6]">
                    <span class="material-symbols-outlined text-[#0f172a] text-sm">open_in_new</span>
                </button>
                <button id="toggleFormBtn" class="w-8 h-8 flex items-center justify-center rounded-xl hover:bg-[#f2f4f6] transition-colors active:scale-95 duration-150">
                    <span class="material-symbols-outlined text-[#0f172a]" id="toggleFormIcon">add</span>
                </button>
            </div>
        </div>

        <form id="addAppForm" style="display: none;" class="mt-4 flex-col gap-3">
            <h3 id="formTitle" class="text-sm font-bold text-on-surface">Add New Application</h3>
            <input type="hidden" id="editAppId">
            <input type="text" id="appName" placeholder="Memorable Name" class="text-sm rounded-lg border-outline-variant/30 bg-surface-container-lowest" required>
            <input type="text" id="appAddress" placeholder="Site Address" class="text-sm rounded-lg border-outline-variant/30 bg-surface-container-lowest" required>
            <input type="text" id="appAuthority" placeholder="Local Authority" class="text-sm rounded-lg border-outline-variant/30 bg-surface-container-lowest" required>
            <input type="text" id="appReference" placeholder="Reference Number" class="text-sm rounded-lg border-outline-variant/30 bg-surface-container-lowest">
            <input type="url" id="appUrl" placeholder="Direct URL" class="text-sm rounded-lg border-outline-variant/30 bg-surface-container-lowest" required>
            <input type="url" id="appCommsUrl" placeholder="Comms URL (Internal)" class="text-sm rounded-lg border-outline-variant/30 bg-surface-container-lowest">
            <div class="flex flex-col gap-1 mt-1">
                <label for="appStatus" class="text-xs font-semibold text-outline">Status:</label>
                <select id="appStatus" class="text-sm rounded-lg border-outline-variant/30 bg-surface-container-lowest py-2 px-3" required>
                    <option value="active">Active</option>
                    <option value="approved">Approved</option>
                    <option value="refused">Refused</option>
                </select>
            </div>
            <div class="flex flex-col gap-1 mt-1">
                <label for="appDueDate" class="text-xs font-semibold text-outline">Decision Due Date:</label>
                <input type="date" id="appDueDate" class="text-sm rounded-lg border-outline-variant/30 bg-surface-container-lowest" required>
            </div>
            <div class="flex gap-2 mt-2">
                <button type="submit" id="saveBtn" class="flex-1 py-2 px-3 rounded-lg bg-[#0F172A] text-white text-xs font-bold hover:bg-[#1e293b] transition-colors">Save Application</button>
                <button type="button" id="cancelBtn" style="display: none;" class="flex-1 py-2 px-3 rounded-lg border border-outline-variant/30 bg-surface-container-lowest text-[#0F172A] text-xs font-bold hover:bg-surface-container-high transition-colors">Cancel</button>
            </div>
        </form>
    </header>

    <div class="flex gap-10 px-4 border-b border-[#e2e8f0] bg-[#f7f9fb]/85 backdrop-blur-md shadow-sm text-sm font-bold shrink-0">
        <button id="tabActive" class="text-[#0f172a] border-b-2 border-[#0f172a] py-2 transition-colors">Active</button>
        <button id="tabDecided" class="text-[#64748b] hover:text-[#0f172a] py-2 border-b-2 border-transparent transition-colors">Decided</button>
    </div>

    <main class="flex-1 overflow-y-auto custom-scrollbar px-4 py-4 space-y-3" id="appList">
        <!-- Applications will be dynamically inserted here -->
    </main>

    <script src="popup.js"></script>
</body>
</html>
